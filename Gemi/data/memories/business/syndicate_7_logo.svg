<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a1a" />
  
  <!-- Circuit Board Pattern -->
  <g stroke="#4f46e5" stroke-width="2" fill="none" opacity="0.3">
    <path d="M50 50 L350 50 L350 350 L50 350 Z" />
    <path d="M100 100 L300 100 L300 300 L100 300 Z" />
    <circle cx="50" cy="50" r="5" fill="#4f46e5" />
    <circle cx="350" cy="50" r="5" fill="#4f46e5" />
    <circle cx="350" cy="350" r="5" fill="#4f46e5" />
    <circle cx="50" cy="350" r="5" fill="#4f46e5" />
  </g>
  
  <!-- Stylized "7" -->
  <g transform="translate(150, 100)">
    <path d="M0 0 L100 0 L40 180" stroke="#6366f1" stroke-width="25" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M30 60 L100 60" stroke="#818cf8" stroke-width="10" fill="none" stroke-linecap="round" />
  </g>
  
  <!-- Text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="32" fill="#f8fafc" text-anchor="middle" font-weight="bold">SYNDICATE 7</text>
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Intelligence, Integrated.</text>
</svg>
